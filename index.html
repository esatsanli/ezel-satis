<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezel Bayraktar | Güvenilir Satış</title>
    <style>
        /* YAZI TİPİ VE TEMEL AYARLAR */
        body {
            background-color: #050505; /* Çok koyu siyah */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        /* HAREKETLİ ARKA PLAN (Grid Efekti) */
        body::before {
            content: "";
            position: absolute;
            top: -100px;
            left: -100px;
            width: calc(100% + 200px);
            height: calc(100% + 200px);
            background-image: linear-gradient(rgba(10, 10, 10, 0.7) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(10, 10, 10, 0.7) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            from { transform: perspective(500px) rotateX(60deg) translateY(0); }
            to { transform: perspective(500px) rotateX(60deg) translateY(20px); }
        }

        /* MAVİ LEDLİ KURUCU ROZETİ */
        .admin-badge {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00d2ff;
            color: #00d2ff;
            padding: 10px 25px;
            border-radius: 15px;
            font-size: 1.2rem;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6), inset 0 0 10px rgba(0, 210, 255, 0.2);
            text-shadow: 0 0 5px #00d2ff;
            letter-spacing: 2px;
            margin-bottom: 30px;
            position: relative;
        }

        /* EKRAN TARAMA ÇİZGİLERİ EFECTİ */
        .admin-badge::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1) 1px, transparent 1px, transparent 2px);
            border-radius: 15px;
        }

        /* FOTOĞRAF VE KIRMIZI ÇERÇEVE */
        .profile-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 15px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            margin-bottom: 20px;
        }

        /* --- YENİ: KIRMIZI LEDLİ TELEGRAM İSMİ --- */
        .tg-container {
            margin-bottom: 15px;
        }

        .tg-user-btn {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ff0000;
            color: #ff0000;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5), inset 0 0 8px rgba(255, 0, 0, 0.2);
            text-shadow: 0 0 5px #ff0000;
            letter-spacing: 1px;
            transition: 0.3s ease;
        }

        .tg-user-btn:hover {
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.8), inset 0 0 12px rgba(255, 0, 0, 0.4);
            transform: scale(1.05);
        }

        .tg-user-btn img {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            filter: drop-shadow(0 0 3px #ff0000);
        }

        /* --- YENİ: MASSAKA CEHENNEMİN DİBİ --- */
        .status {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 30px;
            font-style: italic;/* FİYAT LİSTESİ BUTONU */
        .menu-btn {
            background-color: transparent;
            border: 2px solid white;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s ease;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .menu-btn:hover {
            background-color: white;
            color: black;
            box-shadow: 0 0 15px white;
        }

        /* MODAL PENCERE */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            z-index: 1000;
            color: white;
            padding-top: 50px;
            overflow-y: auto;
        }

        .modal-content {
            background-color: #0a0a0a;
            margin: 5% auto;
            padding: 30px;
            border: 1px solid #ff0000;
            width: 80%;
            max-width: 500px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255,0,0,0.5);
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .section-title {
            color: #ff0000;
            font-size: 1.3rem;
            margin-top: 20px;
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
            text-shadow: 0 0 5px #ff0000;
        }

        .modal-content p {
            font-size: 0.9rem;
            line-height: 1.6;
            margin: 5px 0;
            color: #ddd;
        }
    </style>
</head>
<body>

    <div class="admin-badge">
        SİTE KURUCUSU: @ROGUE44V
    </div>

    <img src="profil.jpg" alt="Ezel" class="profile-img">

    <div class="tg-container">
        <a href="https://t.me/ezelbayraktarrtr" target="_blank" class="tg-user-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="TG">
            @ezelbayraktarrtr
        </a>
    </div>

    <div class="status">
        Çalıyor: Massaka - Cehennemin Dibi
    </div>

    <button class="menu-btn" onclick="openMenu()">Fiyat Listesi •••</button>

    <audio id="muzik" loop>
        <source src="muzik2.mp3" type="audio/mpeg">
    </audio>

    <div id="priceModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeMenu()">&times;</span>
            <span class="section-title">TEKLİ KART-CREDDIIT</span>
            <p>• 1X CHECKED LIVE KART 500<br>
            • İSTEK BİN LIVE 600<br>
            • 3X KART 1400</p>

            <span class="section-title">ÇOKLU SATIŞ</span>
            <p>• 20X TXT KART (2500TL)<br>
            • 40X TXT KART (4000TL)<br>
            • 80X TXT KART (6500TL)</p>
            
            <p style="text-align: center; font-size: 0.7rem; color: #ff0000; margin-top: 20px;">
                * NERDEYSE TÜM SİTELERİN METHODU MEVCUT *
            </p>
        </div>
    </div>

    <script>
        function openMenu() { document.getElementById("priceModal").style.display = "block"; }
        function closeMenu() { document.getElementById("priceModal").style.display = "none"; }
        window.onclick = function(event) {
            if (event.target == document.getElementById("priceModal")) { closeMenu(); }
        }
        document.body.addEventListener('click', function() { var audio = document.getElementById('muzik'); audio.play(); }, { once: true });
    </script>

</body>
</html>
